function showToast(msg, duration = 2400) {
    const old = document.getElementById('_nd_toast');
    if (old) old.remove();
    const t = document.createElement('div');
    t.id = '_nd_toast';
    t.textContent = msg;
    Object.assign(t.style, {
        position: 'fixed', bottom: '28px', left: '50%',
        transform: 'translateX(-50%) translateY(10px)',
        background: 'rgba(30,30,40,0.92)', color: '#fff',
        padding: '10px 24px', borderRadius: '24px',
        fontSize: '13px', fontFamily: 'Poppins,sans-serif',
        fontWeight: '600', zIndex: '999999',
        pointerEvents: 'none',
        boxShadow: '0 4px 18px rgba(0,0,0,.35)',
        opacity: '0', transition: 'opacity .22s, transform .22s',
        whiteSpace: 'nowrap',
    });
    document.body.appendChild(t);
    requestAnimationFrame(() => {
        t.style.opacity = '1';
        t.style.transform = 'translateX(-50%) translateY(0)';
    });
    setTimeout(() => {
        t.style.opacity = '0';
        t.style.transform = 'translateX(-50%) translateY(8px)';
        setTimeout(() => t.remove(), 280);
    }, duration);
}

/* Draw image onto canvas via Image() — works locally & on server.
   Canvas holds pixel data only; original file path is NOT in the DOM. */
function drawImageToCanvas(src, size) {
    return new Promise((resolve) => {
        const img = new Image();

        img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width  = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // Circular clip
            ctx.save();
            ctx.beginPath();
            ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
            ctx.closePath();
            ctx.clip();
            ctx.drawImage(img, 0, 0, size, size);
            ctx.restore();

            // Burn invisible LSB watermark
            burnWatermark(ctx, size);

            resolve(canvas);
        };

        img.onerror = () => resolve(null); // triggers initials fallback

        // Setting src AFTER onload — always fires correctly
        img.src = src;
    });
}

/* Encode owner name in least-significant bits of corner pixels */
function burnWatermark(ctx, size) {
    try {
        const marker = 'NabinDhakal(c)' + new Date().getFullYear();
        const pw = Math.min(size, 80);
        const data = ctx.getImageData(0, 0, pw, 4);
        const d = data.data;
        for (let i = 0; i < marker.length && i * 4 + 2 < d.length; i++) {
            const c = marker.charCodeAt(i);
            d[i*4+0] = (d[i*4+0] & 0xFE) | ((c >> 0) & 1);
            d[i*4+1] = (d[i*4+1] & 0xFE) | ((c >> 1) & 1);
            d[i*4+2] = (d[i*4+2] & 0xFE) | ((c >> 2) & 1);
        }
        ctx.putImageData(data, 0, 0);
    } catch (_) { /* tainted canvas on cross-origin — skip */ }
}

/* Purple initials fallback */
function buildInitialsCanvas(name, size) {
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = size;
    const ctx = canvas.getContext('2d');
    const r = size / 2;
    ctx.fillStyle = '#7466aa';
    ctx.beginPath();
    ctx.arc(r, r, r, 0, Math.PI * 2);
    ctx.fill();
    const initials = name.split(' ').map(w => w[0] || '').join('').toUpperCase().slice(0, 2);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.round(size * 0.36)}px Poppins,sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(initials, r, r + size * 0.03);
    return canvas;
}

/* Transparent shield div — sits on top of canvas, blocks all interactions */
function buildShield(size) {
    const s = document.createElement('div');
    Object.assign(s.style, {
        position: 'absolute', inset: '0',
        width: size + 'px', height: size + 'px',
        borderRadius: '50%', zIndex: '10',
        background: 'transparent', cursor: 'default',
        userSelect: 'none', WebkitUserSelect: 'none',
        WebkitTouchCallout: 'none',
    });
    // // Block right-click
    // s.addEventListener('contextmenu', e => {
    //     e.preventDefault();
    //     e.stopPropagation();
    //     showToast('🔒 Image is protected');
    // });
    // Block drag
    s.addEventListener('dragstart', e => { e.preventDefault(); e.stopPropagation(); });
    // Block mobile long-press
    let th = null;
    s.addEventListener('touchstart', () => {
        th = setTimeout(() => showToast('🔒 Image is protected'), 380);
    }, { passive: true });
    s.addEventListener('touchend',  () => clearTimeout(th));
    s.addEventListener('touchmove', () => clearTimeout(th));
    return s;
}

/* Build the full protected photo wrapper */
async function buildPhotoWrapper(size) {
    const wrapper = document.createElement('div');
    wrapper.id = 'header-photo';
    Object.assign(wrapper.style, {
        position: 'relative',
        width: size + 'px',
        height: size + 'px',
        flexShrink: '0',
        userSelect: 'none',
        WebkitUserSelect: 'none',
        WebkitTouchCallout: 'none',
    });

    // Show skeleton while loading
    const skeleton = document.createElement('div');
    Object.assign(skeleton.style, {
        position: 'absolute', inset: '0',
        width: size + 'px', height: size + 'px',
        borderRadius: '50%', border: '3px solid #7466aa',
        background: 'linear-gradient(90deg,#e8e4f5 25%,#d6d0ee 50%,#e8e4f5 75%)',
        backgroundSize: '200% 100%',
        animation: 'ndShimmer 1.4s infinite',
    });
    wrapper.appendChild(skeleton);

    // Load image → canvas (non-blocking)
    const canvas = await drawImageToCanvas(RESUME_DATA.photo, size)
        ?? buildInitialsCanvas(RESUME_DATA.name, size);

    // Style canvas
    Object.assign(canvas.style, {
        position: 'absolute', inset: '0',
        width: size + 'px', height: size + 'px',
        borderRadius: '50%',
        border: '3px solid #7466aa',
        boxShadow: '0 6px 14px rgba(116,102,170,.28)',
        display: 'block',
        pointerEvents: 'none', // shield handles all events
        userSelect: 'none',
    });
    canvas.setAttribute('draggable', 'false');

    // Direct canvas protection (backup)
    canvas.addEventListener('contextmenu', e => {
        e.preventDefault();
        showToast('🔒 Image is protected');
    });

    skeleton.remove();
    wrapper.appendChild(canvas);
    wrapper.appendChild(buildShield(size));

    return wrapper;
}

// ════════════════════════════════════════════
//  DOM HELPER
// ════════════════════════════════════════════
const el = (tag, attrs = {}, ...children) => {
    const node = document.createElement(tag);
    Object.entries(attrs).forEach(([k, v]) => {
        if (k === 'cls')       v.split(' ').filter(Boolean).forEach(c => node.classList.add(c));
        else if (k === 'text') node.textContent = v;
        else if (k === 'html') node.innerHTML   = v;
        else if (k.startsWith('on')) node.addEventListener(k.slice(2), v);
        else node.setAttribute(k, v);
    });
    children.flat().forEach(c =>
        c && node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c)
    );
    return node;
};

const copyText = txt => navigator.clipboard.writeText(txt).catch(() => {});

// ════════════════════════════════════════════
//  COMPONENT BUILDERS
// ════════════════════════════════════════════
function buildEntry(data) {
    const titleEl = el('div', { cls: 'entry-title', text: data.title });
    const parts   = [];
    if (data.subtitle) parts.push(el('div', { cls: 'entry-subtitle', text: data.subtitle }));
    if (data.bullets) {
        const ul = el('ul');
        data.bullets.forEach(b => ul.appendChild(el('li', { text: b })));
        parts.push(el('div', { cls: 'entry-content' }, ul));
    } else if (data.content) {
        parts.push(el('div', { cls: 'entry-content', text: data.content }));
    }
    const body    = el('div', { cls: 'entry-body' }, ...parts);
    const wrapper = el('div', { cls: 'entry' }, titleEl, body);
    titleEl.addEventListener('click', () => {
        titleEl.classList.toggle('active');
        wrapper.classList.toggle('collapsed');
    });
    return wrapper;
}

function buildSection(icon, label, content, extraCls = '') {
    const arrow   = el('span', { cls: 's-arrow', text: '▼' });
    const iconEl  = el('span', { cls: 's-icon',  text: icon });
    const titleEl = el('div',  { cls: 'section-title' }, iconEl, label, arrow);
    const body    = el('div',  { cls: 's-body' }, content);
    const section = el('div',  { cls: 'r-section ' + extraCls }, titleEl, body);
    titleEl.addEventListener('click', () => section.classList.toggle('collapsed'));
    return section;
}

function buildSkills(list) {
    const wrap = el('div', { cls: 'skill-tags' });
    list.forEach(s => {
        const tag = el('button', { cls: 'skill-tag', text: s });
        tag.addEventListener('click', () => tag.classList.toggle('active'));
        wrap.appendChild(tag);
    });
    return wrap;
}

// ════════════════════════════════════════════
//  TOOLBAR ACTIONS
// ════════════════════════════════════════════
function downloadPDF() {
    window.print();
    setTimeout(() => alert(
        'In the Print dialog:\n' +
        '1. Destination → Save as PDF\n' +
        '2. Paper size  → Custom: 9.5 × 13 in\n' +
        '3. Margins     → None / Minimum\n' +
        '4. ✅ Background graphics ON\n' +
        '5. Click Save'
    ), 400);
}
function shareResume() {
    const url = window.location.href;
    if (navigator.share) {
        navigator.share({ title: 'Nabin Dhakal Resume', text: 'Java Developer Resume', url }).catch(() => {});
    } else {
        navigator.clipboard.writeText(url).then(() => showToast('✅ Link copied!'));
    }
}
function copyContacts() {
    const txt = RESUME_DATA.contact.map(c => c.label).join(' | ');
    navigator.clipboard.writeText(txt)
        .then(()  => showToast('✅ Contacts copied!'))
        .catch(()  => alert('Copy not supported.'));
}

// ════════════════════════════════════════════
//  MAIN BUILD
// ════════════════════════════════════════════
async function buildPage() {

    // ── Inject CSS ────────────────────────────
    const style = document.createElement('style');
    style.textContent = CSS;
    document.head.appendChild(style);
    document.title = `${RESUME_DATA.name} - Resume`;

    // ── Toolbar ───────────────────────────────
    const toolbar = el('div', { id: 'toolbar' },
        el('button', { text: '🖨️ Print',        onclick: () => window.print() }),
        el('button', { text: '📥 Save as PDF',   onclick: downloadPDF }),
        el('button', { text: '📤 Share',          onclick: shareResume }),
        el('button', { text: '📋 Copy Contacts', onclick: copyContacts }),
    );
    document.body.appendChild(toolbar);

    // ── Skeleton placeholder (shows instantly) ─
    const photoSlot = document.createElement('div');
    photoSlot.id = 'header-photo';
    Object.assign(photoSlot.style, {
        position: 'relative', width: '88px', height: '88px', flexShrink: '0',
    });
    const skeleton = document.createElement('div');
    Object.assign(skeleton.style, {
        width: '88px', height: '88px', borderRadius: '50%',
        border: '3px solid #7466aa',
        background: 'linear-gradient(90deg,#e8e4f5 25%,#d6d0ee 50%,#e8e4f5 75%)',
        backgroundSize: '200% 100%',
        animation: 'ndShimmer 1.4s infinite',
    });
    photoSlot.appendChild(skeleton);

    // ── Name / Role / Tagline ─────────────────
    const nameEl   = el('div',  { id: 'r-name',    text: RESUME_DATA.name });
    const rolePill = el('span', { cls: 'role-pill', text: RESUME_DATA.role });
    const headline = el('div',  { id: 'headline' }, nameEl, rolePill);
    const tagline  = el('p',    { id: 'r-tagline',  text: RESUME_DATA.tagline });
    const hContent = el('div',  { id: 'header-content' }, headline, tagline);
    nameEl.addEventListener('click', () => {
        copyText(RESUME_DATA.name);
        showToast('✅ Name copied!');
    });

    // ── QR Code ───────────────────────────────
    const qrImg = el('img', { alt: 'QR Code' });
    qrImg.setAttribute('draggable', 'false');
    qrImg.style.pointerEvents = 'none';
    const qrCard = el('div', { id: 'qr-card' },
        qrImg, el('small', { text: 'Scan to view' })
    );
    qrCard.addEventListener('contextmenu', e => { e.preventDefault(); showToast('🔒 Image is protected'); });
    qrCard.addEventListener('dragstart',   e =>   e.preventDefault());
    window.addEventListener('load', () => {
        qrImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data='
            + encodeURIComponent(window.location.href);
        qrCard.addEventListener('click', () =>
            navigator.clipboard.writeText(window.location.href)
                .then(() => showToast('✅ Link copied!')).catch(() => {})
        );
    });

    // ── Contact Bar ───────────────────────────
    const contactBar = el('div', { id: 'contact-bar' });
    RESUME_DATA.contact.forEach(c => {
        let inner;
        if (c.href) {
            const a = el('a', { href: c.href, text: c.label });
            if (c.target) a.setAttribute('target', c.target);
            if (c.href.startsWith('tel:')) {
                a.addEventListener('click', e => {
                    if (!navigator.userAgent.match(/iPhone|Android|iPad/)) {
                        e.preventDefault();
                        copyText(c.label);
                        showToast('📞 Copied: ' + c.label);
                    }
                });
            }
            inner = a;
        } else {
            inner = document.createTextNode(c.label);
        }
        contactBar.appendChild(el('span', {},
            document.createTextNode(c.icon + ' '), inner
        ));
    });

    // ── Assemble Header ───────────────────────
    const headerMain = el('div', { id: 'header-main' }, photoSlot, hContent, qrCard);
    const header     = el('div', { id: 'r-header' }, headerMain, contactBar);

    // ── Sections ─────────────────────────────
    const projBody = el('div');
    RESUME_DATA.projects.forEach(p => projBody.appendChild(buildEntry(p)));

    const expBody = el('div');
    RESUME_DATA.experience.forEach(e => expBody.appendChild(buildEntry(e)));

    const eduBody = el('div');
    RESUME_DATA.education.forEach(e => eduBody.appendChild(buildEntry(e)));

    const rBody = el('div', { id: 'r-body' },
        buildSection('📝', ' Professional Summary',
            el('p', { cls: 'plain-text', text: RESUME_DATA.summary.trim() }), 'full'),
        buildSection('⚡', ' Skills', buildSkills(RESUME_DATA.skills), 'full'),
        buildSection('🚀', ' Projects', projBody),
        buildSection('💼', ' Professional Experience', expBody),
        buildSection('🎓', ' Academic History', eduBody, 'full'),
    );

    // ── Mount page immediately ────────────────
    const resume = el('div', { id: 'resume' }, header, rBody);
    document.body.appendChild(resume);

    // ── Load protected photo asynchronously ───
    // Page is already visible — photo loads in background
    buildPhotoWrapper(88).then(protectedEl => {
        if (photoSlot.parentNode) {
            photoSlot.parentNode.replaceChild(protectedEl, photoSlot);
        }
    });
}

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
buildPage();
</script>
</body>
</html>
