    // ════════════════════════════════════════════
    //  HELPERS
    // ════════════════════════════════════════════
    const el = (tag, attrs = {}, ...children) => {
        const node = document.createElement(tag);
        Object.entries(attrs).forEach(([k, v]) => {
            if (k === 'cls') v.split(' ').filter(Boolean).forEach(c => node.classList.add(c));
            else if (k === 'text') node.textContent = v;
            else if (k === 'html') node.innerHTML = v;
            else if (k.startsWith('on')) node.addEventListener(k.slice(2), v);
            else node.setAttribute(k, v);
        });
        children.flat().forEach(c => c && node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
        return node;
    };

    const copyText = txt =>
        navigator.clipboard.writeText(txt).catch(() => {});

    // ════════════════════════════════════════════
    //  COMPONENT BUILDERS
    // ════════════════════════════════════════════

    /** Entry block (project / experience / education) */
    function buildEntry(data) {
        const titleEl = el('div', { cls: 'entry-title', text: data.title });
        const bodyParts = [];

        if (data.subtitle)
            bodyParts.push(el('div', { cls: 'entry-subtitle', text: data.subtitle }));

        if (data.bullets) {
            const ul = el('ul');
            data.bullets.forEach(b => ul.appendChild(el('li', { text: b })));
            bodyParts.push(el('div', { cls: 'entry-content' }, ul));
        } else if (data.content) {
            bodyParts.push(el('div', { cls: 'entry-content', text: data.content }));
        }

        const body = el('div', { cls: 'entry-body' }, ...bodyParts);
        const wrapper = el('div', { cls: 'entry' }, titleEl, body);

        titleEl.addEventListener('click', () => {
            titleEl.classList.toggle('active');
            wrapper.classList.toggle('collapsed');
        });

        return wrapper;
    }

    /** Section with collapsible body */
    function buildSection(icon, label, bodyContent, extraCls = '') {
        const arrow  = el('span', { cls: 's-arrow', text: '▼' });
        const iconEl = el('span', { cls: 's-icon', text: icon });
        const titleEl = el('div', { cls: 'section-title' }, iconEl, label, arrow);
        const body    = el('div', { cls: 's-body' }, bodyContent);
        const section = el('div', { cls: 'r-section ' + extraCls }, titleEl, body);

        titleEl.addEventListener('click', () => section.classList.toggle('collapsed'));
        return section;
    }

    /** Skills section content */
    function buildSkills(skills) {
        const wrap = el('div', { cls: 'skill-tags' });
        skills.forEach(s => {
            const tag = el('button', { cls: 'skill-tag', text: s });
            tag.addEventListener('click', () => tag.classList.toggle('active'));
            wrap.appendChild(tag);
        });
        return wrap;
    }

    // ════════════════════════════════════════════
    //  PAGE BUILD
    // ════════════════════════════════════════════
    function buildPage() {
        // ── Inject CSS ──────────────────────────
        const style = document.createElement('style');
        style.textContent = CSS;
        document.head.appendChild(style);
        document.title = `${RESUME_DATA.name} - Resume`;

        // ── TOOLBAR ─────────────────────────────
        const toolbar = el('div', { id: 'toolbar' },
            el('button', { text: '🖨️ Print',        onclick: () => window.print() }),
            el('button', { text: '📥 Save as PDF',   onclick: downloadPDF }),
            el('button', { text: '📤 Share',          onclick: shareResume }),
            el('button', { text: '📋 Copy Contacts', onclick: copyContacts }),
        );

        // ── PHOTO ────────────────────────────────
        const photo = el('img', { src: RESUME_DATA.photo, alt: RESUME_DATA.name });
        const headerPhoto = el('div', { id: 'header-photo' }, photo);

        // ── NAME + ROLE + TAGLINE ────────────────
        const nameEl    = el('div', { id: 'r-name', text: RESUME_DATA.name });
        const rolePill  = el('span', { cls: 'role-pill', text: RESUME_DATA.role });
        const headline  = el('div', { id: 'headline' }, nameEl, rolePill);
        const tagline   = el('p',   { id: 'r-tagline', text: RESUME_DATA.tagline });
        const headerContent = el('div', { id: 'header-content' }, headline, tagline);

        nameEl.addEventListener('click', () => copyText(RESUME_DATA.name));

        // ── QR CODE ──────────────────────────────
        const qrImg  = el('img', { alt: 'QR Code', id: 'qr-img' });
        const qrCard = el('div', { id: 'qr-card' },
            qrImg,
            el('small', { text: 'Scan to view' })
        );
        // QR src set after page load (needs URL)
        window.addEventListener('load', () => {
            const url = window.location.href;
            qrImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=' + encodeURIComponent(url);
            qrCard.addEventListener('click', () =>
                navigator.clipboard.writeText(url).then(() => alert('Link copied.')).catch(() => {})
            );
        });

        // ── HEADER MAIN ROW ───────────────────────
        const headerMain = el('div', { id: 'header-main' }, headerPhoto, headerContent, qrCard);

        // ── CONTACT BAR ──────────────────────────
        const contactBar = el('div', { id: 'contact-bar' });
        RESUME_DATA.contact.forEach(c => {
            let inner;
            if (c.href) {
                const a = el('a', { href: c.href, text: c.label });
                if (c.target) a.setAttribute('target', c.target);
                if (c.href.startsWith('tel:')) {
                    a.addEventListener('click', e => {
                        if (!navigator.userAgent.match(/iPhone|Android|iPad/)) {
                            e.preventDefault();
                            copyText(c.label);
                            alert('Copied: ' + c.label);
                        }
                    });
                }
                inner = a;
            } else {
                inner = document.createTextNode(c.label);
            }
            contactBar.appendChild(el('span', {}, document.createTextNode(c.icon + ' '), inner));
        });

        // ── FULL HEADER ───────────────────────────
        const header = el('div', { id: 'r-header' }, headerMain, contactBar);

        // ── SUMMARY ──────────────────────────────
        const summaryContent = el('p', { cls: 'plain-text', text: RESUME_DATA.summary.trim() });
        const summarySection = buildSection('📝', ' Professional Summary', summaryContent, 'full');

        // ── SKILLS ───────────────────────────────
        const skillsSection = buildSection('⚡', ' Skills', buildSkills(RESUME_DATA.skills), 'full');

        // ── PROJECTS ─────────────────────────────
        const projectsBody = el('div');
        RESUME_DATA.projects.forEach(p => projectsBody.appendChild(buildEntry(p)));
        const projectsSection = buildSection('🚀', ' Projects', projectsBody);

        // ── EXPERIENCE ───────────────────────────
        const expBody = el('div');
        RESUME_DATA.experience.forEach(e => expBody.appendChild(buildEntry(e)));
        const expSection = buildSection('💼', ' Professional Experience', expBody);

        // ── EDUCATION ────────────────────────────
        const eduBody = el('div');
        RESUME_DATA.education.forEach(e => eduBody.appendChild(buildEntry(e)));
        const eduSection = buildSection('🎓', ' Academic History', eduBody, 'full');

        // ── BODY GRID ────────────────────────────
        const body = el('div', { id: 'r-body' },
            summarySection,
            skillsSection,
            projectsSection,
            expSection,
            eduSection,
        );

        // ── CONTAINER ────────────────────────────
        const resume = el('div', { id: 'resume' }, header, body);

        // ── MOUNT ────────────────────────────────
        document.body.appendChild(toolbar);
        document.body.appendChild(resume);
    }

    // ════════════════════════════════════════════
    //  TOOLBAR ACTIONS
    // ════════════════════════════════════════════
    function downloadPDF() {
        window.print();
        setTimeout(() => alert(
            'In the Print dialog:\n' +
            '1. Destination → Save as PDF\n' +
            '2. Paper size  → Custom: 9.5 × 13 in\n' +
            '3. Margins     → None / Minimum\n' +
            '4. ✅ Background graphics ON\n' +
            '5. Click Save'
        ), 400);
    }

    function shareResume() {
        const url = window.location.href;
        if (navigator.share) {
            navigator.share({ title: 'Nabin Dhakal Resume', text: 'Java Developer Resume', url }).catch(() => {});
        } else {
            navigator.clipboard.writeText(url).then(() => alert('Link copied to clipboard!'));
        }
    }

    function copyContacts() {
        const lines = RESUME_DATA.contact.map(c => c.label).join(' | ');
        copyText(lines).then ? copyText(lines).then(() => alert('Contacts copied!')) : alert('Contacts copied!');
        navigator.clipboard.writeText(lines)
            .then(() => alert('Contacts copied!'))
            .catch(() => alert('Copy not supported.'));
    }
